#changing prwfix to `
set -g prefix `
unbind C-b
bind ` send-prefix

# kill window
bind q kill-window

# Enabling mouse support 
set -g mouse on

# Start windows and pane numbering from 1 
set -g base-index 1
setw -g pane-base-index 1


# Change taskbar position 
set -g status-position top

# ===============================================================================
# DESIGN & STATUS BAR 
# ===============================================================================

# Improve colors 
set -g default-terminal "screen-256color"

# customize status bar 
set -g status-style bg=black,fg=cyan

# Highlight the active window in the status bar 
set-window-option -g window-status-current-style bg=cyan,fg=black
#
# # Padding 
# # 1. Enable two status lines
# set -g status 2
#
# # 2. Move the bar to the top (if not already there)
# set -g status-position top
#
# # 3. Set the first line to your actual status content
# # (By default, tmux puts content on line 0)
#
# # 4. Set the second line to be empty/blank
# set -g 'status-format[1]' '#[bg=default] '





# ================================================================================
# PLUGINS
# ================================================================================

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-autoreload'
set -g @plugin 'tmux-plugins/jaclu/tmux-menus'
set -g @plugin 'tmux-plugins/tmux-fzf'
set -g @plugin 'tmux-plugins/catppuccin/tmux'


set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# In your ~/.tmux.conf

# Add the colors from the pallete. Check the themes/ directory for all options.

# Some basic mocha colors.
set -g @ctp_bg "#24273a"
set -g @ctp_surface_1 "#494d64"
set -g @ctp_fg "#cad3f5"
set -g @ctp_mauve "#c6a0f6"
set -g @ctp_crust "#181926"

# status line
set -gF status-style "bg=#{@ctp_bg},fg=#{@ctp_fg}"

# windows
set -gF window-status-format "#[bg=#{@ctp_surface_1},fg=#{@ctp_fg}] ##I ##T "
set -gF window-status-current-format "#[bg=#{@ctp_mauve},fg=#{@ctp_crust}] ##I ##T "


# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

# Or, if using TPM, just run TPM

# Load catppuccin
# Or, if using TPM, just run TPM
# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)

run '~/.config/tmux/plugins/tmux-menus/menus.tmux'
run '~/.config/tmux/plugins/tmux-fzf/main.tmux'
run '~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux'
run '~/.config/tmux/plugin/tpm/tpm'
